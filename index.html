<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xml to Xlsx</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <!-- SheetJS -->
    <script src="xlsx.full.min.js"></script>
</head>

<body>
<div class="container">
<div class="card">
<header>
    <h1>Tool convert XML thành XLSX</h1>
    <h2>Published by Trường</h2>
    <p>Mô tả: Chuyển file XML quá lớn mà Excel không đọc nổi thành file XLSX  </p>
</header>
<hr>
<section>
    <label class="section-title" for="fileInput"> 📂 Chọn file XML cần chuyển </label>
    <input id="fileInput" type="file" accept=".xml">
</section>

<section>
    <button id="convertBtn" type="button"> 🚀 Convert </button>
</section>

<section>
    <div class="section-title">📋 Status</div>
    <div id="statusOutput">Ready</div>
</section>

<section>
    <div class="section-title"> ⏳ Progress </div>
    <progress
        id="progressBar"
        value="0"
        max="100"
        style="width:100%; height:22px;">
    </progress>
    <div id="progressText"> 0% </div>
</section>

<section>
<a id="downloadBtn" download style="display:none;"> 📥 Download file XLSX </a>
</section>

<section>
    <div class="section-title"> 📊 File Information </div>
    <div id="fileInfo">
        <div>XML Size :  <span id="xmlSize">-</span></div>
        <div>XLSX Size :  <span id="xlsxSize">-</span></div>
        <div>Percent sau nén :  <span id="compressionRatio">-</span></div>
    </div>
</section>
</div>

<footer>Tool convert XML thành XLSX<br>
Rảnh rảnh làm chơi </footer>
</div>

<script src="main.js"></script>
</body>
</html>
